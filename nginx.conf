# OpenClaw Gateway Nginx 配置 (Docker)
# 版本: 2.3.0

# WebSocket 升级配置
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# HTTPS 协议检测
map $http_x_forwarded_proto $real_scheme {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 9000;
    server_name _;

    # 日志配置
    access_log /var/log/nginx/openclaw-access.log;
    error_log /var/log/nginx/openclaw-error.log;

    # 客户端最大请求体大小
    client_max_body_size 100M;

    # OpenClaw WebSocket - 标准路径 /openclaw/ws
    location /openclaw/ws {
        proxy_pass http://openclaw-gateway:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时设置（24小时）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;

        # 禁用缓冲（WebSocket 必需）
        proxy_buffering off;
    }

    # OpenClaw Control UI - HTTP 静态资源
    location /openclaw/ {
        proxy_pass http://openclaw-gateway:18789/openclaw/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # OpenClaw 根路径重定向
    location = /openclaw {
        return 301 $real_scheme://$host/openclaw/;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 根路径
    location / {
        return 301 $real_scheme://$host/openclaw/;
    }
}
